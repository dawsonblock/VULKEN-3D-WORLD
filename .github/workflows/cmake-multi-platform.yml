name: CMake on multiple platforms

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: |
            build/bin/**
            build/spv/**
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
      - uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.27.9
      - name: Set reusable strings
        id: strings
        shell: bash
        run: echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
      - name: Install Vulkan tooling (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++ libvulkan-dev vulkan-validationlayers-dev libglfw3-dev vulkan-tools glslang-tools spirv-tools
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        run: choco install vulkan-sdk glfw ninja --yes
      - name: Set Vulkan env (Linux)
        if: runner.os == 'Linux'
        run: echo "VULKAN_SDK=/usr" >> $GITHUB_ENV
      - name: Set Vulkan env (Windows)
        if: runner.os == 'Windows'
        run: echo "VULKAN_SDK=C:\\VulkanSDK\\latest" >> $Env:GITHUB_ENV
      - name: Verify Vulkan
        run: vulkaninfo
      - name: Validate shader (Linux)
        if: runner.os == 'Linux'
        run: |
          glslc shaders_vk/ai/blockize.comp.glsl -o blockize.spv
          spirv-dis blockize.spv >/dev/null
      - name: Validate shader (Windows)
        if: runner.os == 'Windows'
        run: |
          & "$Env:VULKAN_SDK\\Bin\\glslc.exe" shaders_vk/ai/blockize.comp.glsl -o blockize.spv
          & "$Env:VULKAN_SDK\\Bin\\spirv-dis.exe" blockize.spv | Out-Null
      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}
      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }}
      - name: Upload build artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.c_compiler }}
          path: ${{ steps.strings.outputs.build-output-dir }}
