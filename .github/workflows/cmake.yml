name: CMake

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: |
            build/bin/**
            build/spv/**
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
      - uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.27.9
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++ libvulkan-dev vulkan-validationlayers-dev libglfw3-dev vulkan-tools glslang-tools spirv-tools
      - name: Verify Vulkan
        run: vulkaninfo
      - name: Validate shader
        run: |
          glslc shaders_vk/ai/blockize.comp.glsl -o blockize.spv
          spirv-dis blockize.spv >/dev/null
      - name: Set Vulkan env
        run: echo "VULKAN_SDK=/usr" >> $GITHUB_ENV
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Upload build artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: build

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: |
            build/bin/**
            build/spv/**
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
      - uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.27.9
      - name: Install Ninja
        run: choco install ninja --yes
      - name: Install Vulkan SDK and GLFW
        run: choco install vulkan-sdk glfw --yes
      - name: Set Vulkan env
        run: echo "VULKAN_SDK=C:\\VulkanSDK\\latest" >> $Env:GITHUB_ENV
      - name: Verify Vulkan
        run: vulkaninfo
      - name: Validate shader
        run: |
          & "$Env:VULKAN_SDK\\Bin\\glslc.exe" shaders_vk/ai/blockize.comp.glsl -o blockize.spv
          & "$Env:VULKAN_SDK\\Bin\\spirv-dis.exe" blockize.spv | Out-Null
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Upload build artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: build
