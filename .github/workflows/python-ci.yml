name: Python CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy tests --ignore-missing-imports
        env:
          MYPYPATH: src
      - name: Pytest
        run: pytest
        env:
          PYTHONPATH: .
