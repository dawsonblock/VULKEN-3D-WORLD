name: Physics

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check src/physics/player_controller.py src/physics/player_controller_capsule.py tests/test_capsule_ground.py
      - name: Type check
        run: mypy
      - name: Test
        run: pytest
